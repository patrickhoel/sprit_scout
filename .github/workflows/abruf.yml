name: Sprit-Abruf Roboter

on:
  schedule:
    - cron: '*/30 * * * *'  # Alle 30 Minuten
  workflow_dispatch:        # Erlaubt manuellen Start

permissions:                # WICHTIG: Erlaubt dem Roboter das Schreiben
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4 # Update auf v4 (behebt Node-Warnung)

      - name: Python installieren
        uses: actions/setup-python@v5 # Update auf v5 (behebt Node-Warnung)
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: |
          pip install requests pandas python-dotenv

      - name: Daten abrufen
        env:
          TANKERKOENIG_API_KEY: ${{ secrets.TANKERKOENIG_API_KEY }}
        run: python collector.py

      - name: Datenbank speichern
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add spritpreise.db
          # Nur committen und pushen, wenn sich die DB wirklich geändert hat
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automatische Preisaktualisierung" && git push)